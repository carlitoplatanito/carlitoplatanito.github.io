<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NJ LLC Operating Agreement Generator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .legal-font { font-family: 'Libre+Baskerville', serif; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; margin: 0; }
            .shadow-xl, .border { border: none !important; box-shadow: none !important; }
            @page { margin: 2cm; }
            .print-reset { padding: 0 !important; margin: 0 !important; max-width: 100% !important; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Simplified Icon Components (Inline SVG for portability)
        const Icon = ({ name }) => {
            const icons = {
                shield: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                building: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></svg>,
                users: <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
                plus: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
                print: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
                copy: <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            };
            return icons[name] || null;
        };

        function App() {
            const [step, setStep] = useState(1);
            const [copyStatus, setCopyStatus] = useState('');
            const [formData, setFormData] = useState({
                llcName: '',
                formationDate: new Date().toISOString().split('T')[0],
                businessPurpose: 'To engage in any and all lawful business for which a limited liability company may be organized under the laws of the State of New Jersey.',
                managementType: 'member',
                registeredAgentName: '',
                registeredAgentAddress: '',
                members: [{ id: '1', name: '', contribution: 0, percentage: 100 }]
            });

            const totalContribution = useMemo(() => {
                return formData.members.reduce((sum, m) => sum + (parseFloat(m.contribution) || 0), 0);
            }, [formData.members]);

            useEffect(() => {
                if (totalContribution > 0) {
                    const updatedMembers = formData.members.map(m => ({
                        ...m,
                        percentage: ((parseFloat(m.contribution) || 0) / totalContribution * 100).toFixed(2)
                    }));
                    if (JSON.stringify(updatedMembers) !== JSON.stringify(formData.members)) {
                        setFormData(prev => ({ ...prev, members: updatedMembers }));
                    }
                }
            }, [totalContribution, formData.members]);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const addMember = () => {
                setFormData(prev => ({
                    ...prev,
                    members: [...prev.members, { id: Math.random().toString(), name: '', contribution: 0, percentage: 0 }]
                }));
            };

            const updateMember = (id, field, value) => {
                setFormData(prev => ({
                    ...prev,
                    members: prev.members.map(m => m.id === id ? { ...m, [field]: value } : m)
                }));
            };

            const removeMember = (id) => {
                if (formData.members.length > 1) {
                    setFormData(prev => ({ ...prev, members: prev.members.filter(m => m.id !== id) }));
                }
            };

            const printDocument = () => {
                window.print();
            };

            const copyToClipboard = () => {
                const text = document.getElementById('agreement-content').innerText;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopyStatus('Copied!');
                setTimeout(() => setCopyStatus(''), 2000);
            };

            return (
                <div className="min-h-screen p-4 md:p-12">
                    <div className="max-w-4xl mx-auto">
                        
                        {/* UI Header */}
                        <header className="mb-10 flex flex-col md:flex-row md:items-center justify-between no-print">
                            <div>
                                <h1 className="text-3xl font-black text-slate-900 flex items-center gap-3">
                                    <span className="text-blue-600"><Icon name="shield" /></span> NJ LLC Architect
                                </h1>
                                <p className="text-slate-500 font-medium">Draft your NJ Operating Agreement in minutes</p>
                            </div>
                            {step === 4 && (
                                <div className="mt-4 flex gap-3">
                                    <button onClick={copyToClipboard} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-lg hover:bg-slate-50 transition font-semibold text-sm">
                                        <Icon name="copy" /> {copyStatus || 'Copy Text'}
                                    </button>
                                    <button onClick={printDocument} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition font-semibold text-sm shadow-lg shadow-blue-200">
                                        <Icon name="print" /> Export PDF
                                    </button>
                                </div>
                            )}
                        </header>

                        <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden print-reset">
                            
                            {/* Form Steps */}
                            <div className={`p-8 md:p-12 no-print ${step === 4 ? 'hidden' : ''}`}>
                                {step === 1 && (
                                    <div className="space-y-8">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="building" /> Company Details</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-600">LLC Full Legal Name</label>
                                                <input type="text" name="llcName" value={formData.llcName} onChange={handleInputChange} placeholder="e.g. Acme Tech, LLC" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition"/>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-600">Effective Date</label>
                                                <input type="date" name="formationDate" value={formData.formationDate} onChange={handleInputChange} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition"/>
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-sm font-bold text-slate-600">Primary Business Purpose</label>
                                            <textarea name="businessPurpose" value={formData.businessPurpose} onChange={handleInputChange} rows="3" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition"></textarea>
                                        </div>
                                    </div>
                                )}

                                {step === 2 && (
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center">
                                            <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="users" /> Ownership</h2>
                                            <button onClick={addMember} className="flex items-center gap-1 text-blue-600 font-bold text-sm bg-blue-50 px-3 py-2 rounded-lg hover:bg-blue-100">
                                                <Icon name="plus" /> Add Member
                                            </button>
                                        </div>
                                        <div className="space-y-4">
                                            {formData.members.map((m) => (
                                                <div key={m.id} className="grid grid-cols-1 md:grid-cols-12 gap-4 p-5 bg-slate-50 rounded-2xl border border-slate-200">
                                                    <div className="md:col-span-6 space-y-1">
                                                        <label className="text-[10px] font-black uppercase text-slate-400">Full Name</label>
                                                        <input type="text" value={m.name} onChange={(e) => updateMember(m.id, 'name', e.target.value)} placeholder="Member Name" className="w-full p-2 bg-white border border-slate-200 rounded-lg"/>
                                                    </div>
                                                    <div className="md:col-span-4 space-y-1">
                                                        <label className="text-[10px] font-black uppercase text-slate-400">Initial Capital ($)</label>
                                                        <input type="number" value={m.contribution} onChange={(e) => updateMember(m.id, 'contribution', e.target.value)} className="w-full p-2 bg-white border border-slate-200 rounded-lg"/>
                                                    </div>
                                                    <div className="md:col-span-1 flex flex-col justify-center items-center">
                                                        <span className="text-[10px] font-black text-slate-400">SHARE</span>
                                                        <span className="font-mono font-bold text-blue-600">{m.percentage}%</span>
                                                    </div>
                                                    <div className="md:col-span-1 flex items-end justify-center pb-1">
                                                        <button onClick={() => removeMember(m.id)} className="text-slate-300 hover:text-red-500 transition"><Icon name="trash" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {step === 3 && (
                                    <div className="space-y-8">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="shield" /> Registered Agent (NJ)</h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-600">Registered Agent Name</label>
                                                <input type="text" name="registeredAgentName" value={formData.registeredAgentName} onChange={handleInputChange} placeholder="Name of Person or Service" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none"/>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-slate-600">NJ Registered Office Address</label>
                                                <input type="text" name="registeredAgentAddress" value={formData.registeredAgentAddress} onChange={handleInputChange} placeholder="Address in New Jersey" className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none"/>
                                            </div>
                                        </div>
                                        <div className="pt-4 space-y-2">
                                            <label className="text-sm font-bold text-slate-600">Management Structure</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button onClick={() => setFormData(p=>({...p, managementType:'member'}))} className={`p-4 border-2 rounded-xl text-left transition ${formData.managementType === 'member' ? 'border-blue-600 bg-blue-50' : 'border-slate-200'}`}>
                                                    <div className="font-bold">Member-Managed</div>
                                                    <div className="text-xs text-slate-500">Owners run operations</div>
                                                </button>
                                                <button onClick={() => setFormData(p=>({...p, managementType:'manager'}))} className={`p-4 border-2 rounded-xl text-left transition ${formData.managementType === 'manager' ? 'border-blue-600 bg-blue-50' : 'border-slate-200'}`}>
                                                    <div className="font-bold">Manager-Managed</div>
                                                    <div className="text-xs text-slate-500">Designated managers run ops</div>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Navigation Buttons */}
                                <div className="mt-12 flex justify-between pt-8 border-t border-slate-100">
                                    <button onClick={() => setStep(s => s - 1)} disabled={step === 1} className={`px-6 py-3 font-bold rounded-xl transition ${step === 1 ? 'opacity-0' : 'text-slate-400 hover:text-slate-600'}`}>Back</button>
                                    <button onClick={() => setStep(s => s + 1)} className="px-10 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition shadow-lg shadow-slate-200">
                                        {step === 3 ? 'Generate Agreement' : 'Continue'}
                                    </button>
                                </div>
                            </div>

                            {/* Final Document Preview */}
                            <div id="agreement-document" className={`bg-white text-slate-900 legal-font ${step === 4 ? 'block' : 'hidden'}`}>
                                <div id="agreement-content" className="p-12 md:p-20 max-w-[850px] mx-auto space-y-10 leading-relaxed text-justify print:p-0">
                                    
                                    <div className="text-center space-y-4 border-b-2 border-black pb-10">
                                        <h1 className="text-3xl font-bold uppercase tracking-widest leading-tight">Operating Agreement of<br/>{formData.llcName || "[LLC NAME]"}</h1>
                                        <p className="text-sm font-sans font-bold tracking-widest uppercase">A New Jersey Limited Liability Company</p>
                                    </div>

                                    <p>This Operating Agreement (the "Agreement") is made effective as of <strong>{new Date(formData.formationDate).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}</strong>, by and among the Members identified below and the Company.</p>

                                    <section className="space-y-4">
                                        <h3 className="font-bold uppercase tracking-wide border-b border-slate-200 pb-1">Article I: Organization</h3>
                                        <p><strong>1.1 Formation:</strong> The Company was formed as a New Jersey Limited Liability Company by filing the Certificate of Formation with the New Jersey Division of Revenue pursuant to the New Jersey Revised Uniform Limited Liability Company Act (the "Act").</p>
                                        <p><strong>1.2 Purpose:</strong> {formData.businessPurpose}</p>
                                        <p><strong>1.3 Registered Agent:</strong> The initial registered agent is <strong>{formData.registeredAgentName || "[Agent Name]"}</strong> located at <strong>{formData.registeredAgentAddress || "[Agent Address]"}</strong>.</p>
                                    </section>

                                    <section className="space-y-4">
                                        <h3 className="font-bold uppercase tracking-wide border-b border-slate-200 pb-1">Article II: Capital & Ownership</h3>
                                        <p>The Members have made initial capital contributions and hold ownership interests as follows:</p>
                                        <table className="w-full border-collapse font-sans text-sm mt-4">
                                            <thead>
                                                <tr className="bg-slate-50">
                                                    <th className="border-b-2 border-black p-3 text-left">Member Name</th>
                                                    <th className="border-b-2 border-black p-3 text-right">Contribution</th>
                                                    <th className="border-b-2 border-black p-3 text-right">Share %</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {formData.members.map(m => (
                                                    <tr key={m.id}>
                                                        <td className="border-b p-3">{m.name || "[Member Name]"}</td>
                                                        <td className="border-b p-3 text-right">${parseFloat(m.contribution).toLocaleString()}</td>
                                                        <td className="border-b p-3 text-right">{m.percentage}%</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </section>

                                    <section className="space-y-4">
                                        <h3 className="font-bold uppercase tracking-wide border-b border-slate-200 pb-1">Article III: Management</h3>
                                        <p>The Company shall be <strong>{formData.managementType === 'member' ? 'Member-Managed' : 'Manager-Managed'}</strong>. Management decisions shall be made by a majority vote of the ownership interests unless otherwise required by the Act.</p>
                                    </section>

                                    <section className="space-y-4">
                                        <h3 className="font-bold uppercase tracking-wide border-b border-slate-200 pb-1">Article IV: Governing Law</h3>
                                        <p>This Agreement and the rights of the Members shall be governed by and construed in accordance with the laws of the State of New Jersey.</p>
                                    </section>

                                    <div className="pt-20 space-y-16">
                                        <h3 className="font-bold uppercase text-center tracking-widest border-b border-black pb-2">Member Signatures</h3>
                                        <div className="grid grid-cols-2 gap-x-20 gap-y-24">
                                            {formData.members.map(m => (
                                                <div key={m.id} className="space-y-3">
                                                    <div className="border-b border-black h-12"></div>
                                                    <div className="text-[10px] font-sans font-bold uppercase tracking-tighter">
                                                        {m.name || "[MEMBER NAME]"}<br/>
                                                        <span className="text-slate-400">MEMBER</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="mt-12 text-center text-slate-400 text-xs no-print">
                            <p>This is a legal template generator. Consult with a qualified New Jersey attorney for specific legal advice.</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
